name: Deploy to AMP

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: amp-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes lftp jq

      - name: Log in to AMP
        id: amp-login
        env:
          AMP_URL: ${{ secrets.AMP_URL }}
          AMP_USERNAME: ${{ secrets.AMP_USERNAME }}
          AMP_PASSWORD: ${{ secrets.AMP_PASSWORD }}
        run: |
          set -euo pipefail

          response="$(
            curl --fail-with-body --silent --show-error \
              --request POST \
              --header "Content-Type: application/json" \
              --data "$(jq -n \
                --arg username "$AMP_USERNAME" \
                --arg password "$AMP_PASSWORD" \
                '{
                  username: $username,
                  password: $password,
                  token: "",
                  rememberMe: false
                }')" \
              "${AMP_URL%/}/API/Core/Login"
          )"

          session_id="$(
            jq -r '.result.sessionID // .sessionID // empty' <<< "$response"
          )"

          if [[ -z "$session_id" ]]; then
            echo "::error::AMP login failed"
            jq -c 'del(.. | .password?)' <<< "$response"
            exit 1
          fi

          echo "::add-mask::$session_id"
          echo "session_id=$session_id" >> "$GITHUB_OUTPUT"

      - name: Stop application
        id: stop
        env:
          AMP_URL: ${{ secrets.AMP_URL }}
          SESSION_ID: ${{ steps.amp-login.outputs.session_id }}
        run: |
          set -euo pipefail

          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer $SESSION_ID" \
            --header "Content-Type: application/json" \
            --data '{}' \
            "${AMP_URL%/}/API/Core/Stop"

          # Allow the bot to finish its graceful shutdown.
          sleep 5

      - name: Back up application
        id: backup
        env:
          SFTP_HOST: ${{ secrets.AMP_SFTP_HOST }}
          SFTP_PORT: ${{ secrets.AMP_SFTP_PORT }}
          SFTP_USERNAME: ${{ secrets.AMP_USERNAME }}
          SFTP_PASSWORD: ${{ secrets.AMP_PASSWORD }}
          SFTP_PATH: ${{ secrets.AMP_SFTP_PATH }}
        run: |
          set -euo pipefail

          mkdir -p backup

          lftp <<EOF
          set cmd:fail-exit yes
          set net:max-retries 2
          set net:timeout 30
          set sftp:auto-confirm yes

          open -u "$SFTP_USERNAME","$SFTP_PASSWORD" \
            "sftp://$SFTP_HOST:$SFTP_PORT"

          mirror \
            --verbose \
            --exclude-glob .git/ \
            --exclude-glob __pycache__/ \
            --exclude-glob '*.pyc' \
            "$SFTP_PATH" backup

          bye
          EOF

          tar \
            --create \
            --gzip \
            --file amp-backup.tar.gz \
            --directory backup \
            .

      - name: Store backup
        uses: actions/upload-artifact@v4
        with:
          name: amp-backup-${{ github.run_number }}
          path: amp-backup.tar.gz
          retention-days: 14
          if-no-files-found: error

      - name: Request AMP update
        id: update
        env:
          AMP_URL: ${{ secrets.AMP_URL }}
          SESSION_ID: ${{ steps.amp-login.outputs.session_id }}
          AMP_UPDATE_ENDPOINT: ${{ secrets.AMP_UPDATE_ENDPOINT }}
        run: |
          set -euo pipefail

          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer $SESSION_ID" \
            --header "Content-Type: application/json" \
            --data '{}' \
            "${AMP_URL%/}/${AMP_UPDATE_ENDPOINT#/}"

      - name: Start application
        id: start
        if: always() && steps.amp-login.outcome == 'success'
        env:
          AMP_URL: ${{ secrets.AMP_URL }}
          SESSION_ID: ${{ steps.amp-login.outputs.session_id }}
        run: |
          set -euo pipefail

          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer $SESSION_ID" \
            --header "Content-Type: application/json" \
            --data '{}' \
            "${AMP_URL%/}/API/Core/Start"

      - name: Send Discord failure alert
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DEPLOY_DISCORD_WEBHOOK }}
        run: |
          if [[ -z "${DISCORD_WEBHOOK_URL:-}" ]]; then
            echo "No Discord webhook configured"
            exit 0
          fi

          curl --fail-with-body --silent --show-error \
            --header "Content-Type: application/json" \
            --data "$(jq -n \
              --arg repository "${{ github.repository }}" \
              --arg branch "${{ github.ref_name }}" \
              --arg commit "${{ github.sha }}" \
              --arg actor "${{ github.actor }}" \
              --arg url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              '{
                content: "🚨 AMP deployment failed",
                embeds: [{
                  title: $repository,
                  url: $url,
                  color: 15158332,
                  fields: [
                    {
                      name: "Branch",
                      value: $branch,
                      inline: true
                    },
                    {
                      name: "Triggered by",
                      value: $actor,
                      inline: true
                    },
                    {
                      name: "Commit",
                      value: $commit
                    }
                  ]
                }]
              }')" \
            "$DISCORD_WEBHOOK_URL"